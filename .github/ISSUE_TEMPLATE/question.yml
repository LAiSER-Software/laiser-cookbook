name: Question
description: Ask a question about using the recipes
title: "[QUESTION] "
labels: ["question"]

body:
  - type: markdown
    attributes:
      value: |
        Have a question about using LAiSER Cookbook? We're here to help!

  - type: input
    id: recipe
    attributes:
      label: Related Recipe (if applicable)
      description: Which recipe or notebook is your question about?
      placeholder: e.g., Job_Skill_Analysis, Pay_Equity_Analysis, or General

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: Ask your question in detail
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context or background
      placeholder: What are you trying to accomplish? What have you tried so far?

  - type: textarea
    id: environment
    attributes:
      label: Environment (if relevant)
      description: Your setup details if they might be relevant to the question
      placeholder: |
        - OS: [e.g., Windows, macOS, Linux]
        - Python version: [e.g., 3.9.7]
        - Notebook environment: [e.g., Jupyter Lab, Google Colab, VS Code]

  - type: checkboxes
    id: searched
    attributes:
      label: Have you checked existing resources?
      options:
        - label: I have searched existing issues and discussions
        - label: I have read the relevant README files
        - label: I have checked the main documentation