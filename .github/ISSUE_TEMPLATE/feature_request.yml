name: Feature Request
description: Suggest a new recipe or enhancement
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature or recipe! Help us understand what you'd like to see added to the LAiSER Cookbook.

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      description: What type of feature are you requesting?
      options:
        - New Recipe/Notebook
        - Enhancement to Existing Recipe
        - Documentation Improvement
        - Infrastructure/Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case Description
      description: Describe the real-world problem or use case this would solve
      placeholder: Who would benefit from this feature and in what scenarios?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see implemented
      placeholder: What should the feature do? How should it work?
    validations:
      required: true

  - type: textarea
    id: data-requirements
    attributes:
      label: Data Requirements (for new recipes)
      description: If this is a new recipe, what type of input data would it use?
      placeholder: e.g., Job descriptions, resume text, course syllabi, etc.

  - type: textarea
    id: expected-output
    attributes:
      label: Expected Output
      description: What insights, visualizations, or results should this feature provide?
      placeholder: Describe the expected outcomes and how users would benefit

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: Are there similar tools, papers, or examples that illustrate this use case?
      placeholder: Links to relevant resources, research papers, or similar implementations

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information that would help us understand your request
      placeholder: Screenshots, mockups, or detailed explanations