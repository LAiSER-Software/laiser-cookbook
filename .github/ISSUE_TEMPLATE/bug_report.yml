name: Bug Report
description: File a bug report to help us improve
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us understand and fix the issue.

  - type: input
    id: recipe
    attributes:
      label: Recipe/Notebook
      description: Which recipe or notebook is affected?
      placeholder: e.g., Job_Skill_Analysis, Pay_Equity_Analysis, University_Program_Skill_Analysis
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened and what you expected to happen
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open notebook '...'
        2. Run cell '...'
        3. Enter credentials '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment
      placeholder: |
        - OS: [e.g., Windows 11, macOS 12, Ubuntu 20.04]
        - Python version: [e.g., 3.9.7]
        - Notebook environment: [e.g., Jupyter Lab, Google Colab, VS Code]
        - LAiSER version: [e.g., 0.1.0]
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Error Output
      description: If applicable, add screenshots or copy/paste error messages to help explain your problem

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g., specific datasets used, model configurations, etc.)